# Pane navigation with Alt key
bind -n M-j select-pane -L
bind -n M-\; select-pane -R
bind -n M-k select-pane -D
bind -n M-l select-pane -U

# Pane splits that keep the current path
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Pane borders
set -g pane-border-style fg=colour238
set -g pane-active-border-style fg=colour39,bold
set -g pane-border-lines single

# Terminal colors
set -g default-terminal "tmux-256color"
set -sa terminal-overrides ",*:Tc"

# Status bar
set -g status-position bottom
set -g status-interval 5
set -g status-style bg=colour234,fg=colour248

set -g status-left-length 40
set -g status-left "#[fg=colour39,bold] #S #[fg=colour238]│ "

set -g status-right-length 60
set -g status-right "#[fg=colour238]│ #[fg=colour248]%H:%M #[fg=colour238]│ #[fg=colour248]%d %b"

# Window tabs
set -g window-status-format " #I:#W#{?#{>:#{window_panes},1}, #[fg=colour238]#{?#{m:*{*[*,#{window_layout}},⊞,#{?#{m:*{*,#{window_layout}},│,#{?#{m:*[*,#{window_layout}},─,}}}#{window_panes},} "
set -g window-status-current-format "#[fg=colour39,bold] #I:#W#{?#{>:#{window_panes},1}, #[fg=colour238]#{?#{m:*{*[*,#{window_layout}},⊞,#{?#{m:*{*,#{window_layout}},│,#{?#{m:*[*,#{window_layout}},─,}}}#{window_panes},} "
set -g window-status-style fg=colour242
set -g window-status-current-style fg=colour39,bold
set -g window-status-separator ""

# Switch windows with Alt+number, creating if missing
bind -n M-1 run-shell 'tmux select-window -t "#{session_name}:1" || tmux new-window -t "#{session_name}:1"'
bind -n M-2 run-shell 'tmux select-window -t "#{session_name}:2" || tmux new-window -t "#{session_name}:2"'
bind -n M-3 run-shell 'tmux select-window -t "#{session_name}:3" || tmux new-window -t "#{session_name}:3"'
bind -n M-4 run-shell 'tmux select-window -t "#{session_name}:4" || tmux new-window -t "#{session_name}:4"'
bind -n M-5 run-shell 'tmux select-window -t "#{session_name}:5" || tmux new-window -t "#{session_name}:5"'
bind -n M-6 run-shell 'tmux select-window -t "#{session_name}:6" || tmux new-window -t "#{session_name}:6"'
bind -n M-7 run-shell 'tmux select-window -t "#{session_name}:7" || tmux new-window -t "#{session_name}:7"'
bind -n M-8 run-shell 'tmux select-window -t "#{session_name}:8" || tmux new-window -t "#{session_name}:8"'
bind -n M-9 run-shell 'tmux select-window -t "#{session_name}:9" || tmux new-window -t "#{session_name}:9"'

# Misc
set -g mouse on
set -s escape-time 0
set -g focus-events on
set -g history-limit 10000
set -g base-index 1
set -g renumber-windows on
setw -g pane-base-index 1
